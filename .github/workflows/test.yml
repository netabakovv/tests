name: Go CI

on:
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install deps
        run: go mod tidy

      - name: Run tests with coverage
        run: go test ./... -coverprofile=coverage.out

      - name: Install bc
        run: sudo apt-get install -y bc

      - name: Check coverage >= 80%
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Coverage: $COVERAGE%"

          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "Coverage is below 80%"
            exit 1
          fi

      - name: Build Docker image
        run: docker build -t hello-api .

      - name: Run container
        run: docker run -d -p 8080:8080 --name hello-test hello-api

      - name: Wait for container
        run: sleep 3

      - name: Test endpoint with curl
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/hello)
          echo "Status: $STATUS"
          if [ "$STATUS" -ne 200 ]; then
            echo "Endpoint failed"
            docker logs hello-test
            exit 1
          fi

      - name: Stop container
        if: always()
        run: docker stop hello-test